{% extends "catalog/base.html" %}

{% block content %}
<div style="display: flex; gap: 40px; margin-top: 20px;">
    <div style="flex: 1; background: #eee; height: 300px; display: flex; align-items: center; justify-content: center; border-radius: 10px;">
        <span style="font-size: 50px;">📦</span>
    </div>
    <div style="flex: 1;">
        <h1>{{ product.name }}</h1>
        <p class="text-muted">Категория: {{ product.category.name }}</p>
        <h2 style="color: #28a745;">{{ product.price }} руб.</h2>
        <p>В наличии: {{ product.stock }} шт.</p>
        <hr>
        <button class="btn btn-success" style="padding: 15px 30px; font-size: 1.2em;">Добавить в корзину</button>
        <br><br>
        <a href="{% url 'catalog:home' %}">← Вернуться в каталог</a>
    </div>
</div>
{% endblock %}
